spring.application.name=Recommendation-Service-test

# In-memory H2 для тестов
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update

# Полностью отключаем Eureka для тестов
spring.cloud.config.enabled=false
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
spring.main.allow-bean-definition-overriding=true

# Kafka: не запускаем слушателей в тестовом профиле
spring.kafka.listener.auto-startup=false
spring.kafka.producer.bootstrap-servers=localhost:9092

# Отключаем Elasticsearch для тестов
spring.data.elasticsearch.repositories.enabled=false
spring.elasticsearch.uris=http://localhost:9200

# Отключаем Redis для тестов
spring.data.redis.repositories.enabled=false
spring.redis.enabled=false
spring.redis.host=localhost
spring.redis.port=6379
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Отключаем автоконфигурацию для тестов
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
spring.cloud.gateway.enabled=false
spring.ai.openai.api-key=dummy
