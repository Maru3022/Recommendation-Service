spring.application.name=Recommendation-Service-test

# In-memory H2 for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update

# Eureka — disabled
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
spring.cloud.config.enabled=false
spring.main.allow-bean-definition-overriding=true

# Kafka — do not start listeners
spring.kafka.listener.auto-startup=false
spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.bootstrap-servers=localhost:9092

# Elasticsearch — repositories disabled (beans are mocked in tests)
spring.data.elasticsearch.repositories.enabled=false
spring.elasticsearch.uris=http://localhost:9200

# Redis — disabled (bean is mocked in tests)
spring.data.redis.repositories.enabled=false
spring.data.redis.host=localhost
spring.data.redis.port=6379

# OpenAI — dummy key (autoconfiguration excluded below)
spring.ai.openai.api-key=dummy

# Exclude autoconfiguration that requires live infrastructure
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,\
  org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
