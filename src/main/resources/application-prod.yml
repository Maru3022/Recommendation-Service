spring:
  application:
    name: recommendation-service
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/recommendation_db}
    username: ${SPRING_DATASOURCE_USERNAME:recommendation_user}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
    
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
    open-in-view: false
    
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://elasticsearch:9200}
    connection-timeout: 10s
    socket-timeout: 30s
    
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 5s
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
      
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:rec-group-prod}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 3
      acks: all
      
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      embedding:
        model: text-embedding-ada-002
      chat:
        model: gpt-4o-mini

# Feed algorithm tuning
recommendation:
  feed:
    weights:
      social: 0.35
      collaborative: 0.25
      content: 0.20
      trending: 0.15
      freshness: 0.05
    trending-window-hours: 72
    freshness-half-life-hours: 48
    max-author-per-page: 2
    candidate-multiplier: 3
    max-candidates: 300
    similar-users-limit: 5
    knn-candidates-multiplier: 10
    knn-min-candidates: 50
  action:
    interest-embedding-alpha-percent: 30
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://yourdomain.com}

# Logging
logging:
  level:
    com.example.recommendationservice: INFO
    org.springframework: WARN
    org.springframework.data.elasticsearch: WARN
    org.springframework.data.redis: WARN
    org.springframework.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/recommendation-service/application.log
    max-size: 100MB
    max-history: 30

# Server
server:
  port: 8026
  tomcat:
    threads:
      max: 200
      min-spare: 10
    max-connections: 10000
    accept-count: 100
    connection-timeout: 10s
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# Actuator & Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    metrics:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: prod
    export:
      prometheus:
        enabled: true

# Eureka
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka-server:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    metadata-map:
      management:
        context-path: ${management.endpoints.web.base-path:/actuator}

# Circuit Breaker
resilience4j:
  circuitbreaker:
    instances:
      elasticsearch:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
      redis:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        sliding-window-size: 20
      openai:
        failure-rate-threshold: 60
        wait-duration-in-open-state: 60s
        sliding-window-size: 5
  retry:
    instances:
      elasticsearch:
        max-attempts: 3
        wait-duration: 1s
      redis:
        max-attempts: 2
        wait-duration: 500ms
