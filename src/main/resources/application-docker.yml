spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/recommendation_db
    username: user
    password: password

  elasticsearch:
    uris: http://elasticsearch:9200

  data:
    redis:
      host: redis
      port: 6379

  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: rec-group-docker

logging:
  level:
    com.example.recommendationservice: INFO
    org.springframework: WARN

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
