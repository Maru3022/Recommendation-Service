spring.application.name=Recommendation-Service
server.port=8026

spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.embedding.options.model=text-embedding-ada-002

recommendation.feed.weights.social=0.35
recommendation.feed.weights.collaborative=0.25
recommendation.feed.weights.content=0.2
recommendation.feed.weights.trending=0.15
recommendation.feed.weights.freshness=0.05

# Feed algorithm tuning
recommendation.feed.trending-window-hours=72
recommendation.feed.freshness-half-life-hours=48
recommendation.feed.max-author-per-page=2
recommendation.feed.candidate-multiplier=3
recommendation.feed.max-candidates=300
recommendation.feed.similar-users-limit=5
recommendation.feed.knn-candidates-multiplier=10
recommendation.feed.knn-min-candidates=50

# Post action EMA weight for interest embedding (0-100)
recommendation.action.interest-embedding-alpha-percent=30

# CORS
recommendation.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/recommendation_db}
jakarta.persistence.jdbc.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/recommendation_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update

spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://elasticsearch:9200}

spring.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:rec-group}

logging.level.com.example.recommendationservice=WARN
logging.level.org.springframework=WARN

server.tomcat.threads.max=1000
server.tomcat.max-connections=20000
spring.datasource.hikari.maximum-pool-size=20

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://eureka-server:8761/eureka/}
eureka.instance.prefer-ip-address=true

spring.jpa.open-in-view=false
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
