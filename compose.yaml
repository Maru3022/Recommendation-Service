services:
  elasticsearch:
    image: 'docker.elastic.co/elasticsearch/elasticsearch:8.12.0'
    container_name: elasticsearch
    environment:
      - 'discovery.type=single-node'
      - 'xpack.security.enabled=false'
    ports:
      - '9444:9200' # Уникальный порт для ES
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: 'postgres:latest'
    container_name: postgres
    environment:
      - 'POSTGRES_DB=recommendation_db'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=user'
    command: [ "postgres", "-c", "max_connections=200" ]
    ports:
      - '5499:5432' # Уникальный порт для Postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d recommendation_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: 'redis:latest'
    container_name: redis
    ports:
      - '6399:6379' # Уникальный порт для Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: 'confluentinc/cp-zookeeper:7.5.0'
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: 'confluentinc/cp-kafka:7.5.0'
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - '9099:9098' # Уникальный внешний порт для Kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9099
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  recommendation-service:
    build: .
    container_name: recommendation-service
    ports:
      - "8099:8026" # Уникальный внешний порт для Сервиса
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/recommendation_db
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  k6:
    image: grafana/k6
    profiles: ["loadtest"]
    volumes:
      - ./k6:/scripts
    command: run /scripts/load-test.js
    depends_on:
      - recommendation-service

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - recommendation-service

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus