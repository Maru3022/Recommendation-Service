name: CI-CD-Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Application Jar
        run: mvn clean package -DskipTests

      - name: Run Infrastructure and Tests
        run: |
          # Запуск сервисов с пересборкой
          docker compose up -d --build
          
          echo "Waiting for Recommendation-Service on port 8099..."
          # ТЕПЕРЬ ПРОВЕРЯЕМ ПОРТ 8099 (внешний из вашего нового compose)
          timeout 120s bash -c 'until curl -s localhost:8099/actuator/health > /dev/null; do sleep 5; done' || (echo "App failed to start" && docker compose logs && exit 1)
          
          echo "Running k6 load tests..."
          docker compose run --name k6-test k6

      - name: Check App Logs for Errors
        if: always()
        run: |
          echo "=== Checking logs for Critical Exceptions ==="
          docker compose logs recommendation-service | grep -iE "Exception|Error" || echo "No critical errors found."

      - name: Validate k6 Results
        run: |
          EXIT_CODE=$(docker inspect k6-test --format='{{.State.ExitCode}}')
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "k6 tests failed!"
            exit 1
          fi

      - name: Shutdown Infrastructure
        if: always()
        run: docker compose down