name: ci-cd

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  IMAGE_NAME: recommendation-service
  MAVEN_OPTS: "-Xmx1024m"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read

jobs:
  test-matrix:
    name: Tests (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        java: ["21"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Run tests with coverage
        run: mvn -B -ntp clean test jacoco:report

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/failsafe-reports/
            target/site/jacoco/

  package-and-verify:
    name: Package & Verify
    runs-on: ubuntu-latest
    needs: test-matrix
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Verify compilation from a clean state
        run: mvn -B -ntp -DskipTests clean verify

      - name: Cache OWASP Dependency-Check data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: dependency-check-data-${{ runner.os }}-${{ hashFiles('pom.xml') }}
          restore-keys: |
            dependency-check-data-${{ runner.os }}-

      - name: Run OWASP Dependency Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: mvn -B -ntp dependency-check:check -Psecurity-scan
        continue-on-error: true

      - name: Upload OWASP Dependency-Check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.json
          if-no-files-found: warn

      - name: Generate SBOM
        run: mvn cyclonedx:makeAggregateBom

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: recommendation-service-artifacts
          path: |
            target/*.jar
            target/*.jar.original
            target/bom.json
          if-no-files-found: error

  kubernetes-validate:
    name: Kubernetes Validate
    runs-on: ubuntu-latest
    needs: package-and-verify
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        shell: bash
        run: |
          set -euo pipefail
          KUBECTL_VERSION="$(curl -L -s https://dl.k8s.io/release/stable.txt)"
          curl -L -o kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Install kubeconform
        shell: bash
        run: |
          set -euo pipefail
          curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          chmod +x kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Render staging manifests
        shell: bash
        run: |
          mkdir -p rendered
          kubectl kustomize k8s/overlays/staging > rendered/staging.yaml

      - name: Validate staging manifests
        run: kubeconform -strict -summary rendered/staging.yaml

      - name: Render production manifests
        shell: bash
        run: kubectl kustomize k8s/overlays/production > rendered/production.yaml

      - name: Validate production manifests
        run: kubeconform -strict -summary rendered/production.yaml

      - name: Upload rendered manifests
        uses: actions/upload-artifact@v4
        with:
          name: recommendation-service-k8s-rendered
          path: rendered/*.yaml
          if-no-files-found: error

  docker-build-and-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [package-and-verify, kubernetes-validate]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      image: ${{ steps.image.outputs.value }}
      owner: ${{ steps.owner.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: recommendation-service-artifacts
          path: target/

      - name: Normalize image owner to lowercase
        id: owner
        shell: bash
        run: |
          OWNER_LOWER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "value=$OWNER_LOWER" >> "$GITHUB_OUTPUT"

      - name: Define image reference
        id: image
        shell: bash
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "value=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM and scan
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: recommendation-service:sbom
          provenance: false

      - name: Build image for pull requests
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: recommendation-service:pr-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image for main
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.image.outputs.value }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          annotations: |
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    if: github.event_name != 'pull_request'
    timeout-minutes: 15
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check staging kubeconfig availability
        id: precheck
        shell: bash
        env:
          KUBE_CONFIG_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          if [[ -n "$KUBE_CONFIG_STAGING" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip staging deploy when kubeconfig is missing
        if: steps.precheck.outputs.configured != 'true'
        run: echo "KUBE_CONFIG_STAGING is not set. Skipping staging deployment."

      - name: Install kubectl
        if: steps.precheck.outputs.configured == 'true'
        shell: bash
        run: |
          set -euo pipefail
          KUBECTL_VERSION="$(curl -L -s https://dl.k8s.io/release/stable.txt)"
          curl -L -o kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Configure kubeconfig
        if: steps.precheck.outputs.configured == 'true'
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > "$HOME/.kube/config"

      - name: Apply staging manifests
        if: steps.precheck.outputs.configured == 'true'
        run: kubectl apply -k k8s/overlays/staging

      - name: Update staging image
        if: steps.precheck.outputs.configured == 'true'
        run: kubectl set image deployment/recommendation-service recommendation-service=${{ needs.docker-build-and-push.outputs.image }} -n recommendation-staging

      - name: Wait for staging rollout
        if: steps.precheck.outputs.configured == 'true'
        run: kubectl rollout status deployment/recommendation-service -n recommendation-staging --timeout=180s

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build-and-push, deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    timeout-minutes: 15
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check production kubeconfig availability
        id: precheck
        shell: bash
        env:
          KUBE_CONFIG_PRODUCTION: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
        run: |
          if [[ -n "$KUBE_CONFIG_PRODUCTION" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip production deploy when kubeconfig is missing
        if: steps.precheck.outputs.configured != 'true'
        run: echo "KUBE_CONFIG_PRODUCTION is not set. Skipping production deployment."

      - name: Install kubectl
        if: steps.precheck.outputs.configured == 'true'
        shell: bash
        run: |
          set -euo pipefail
          KUBECTL_VERSION="$(curl -L -s https://dl.k8s.io/release/stable.txt)"
          curl -L -o kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Configure kubeconfig
        if: steps.precheck.outputs.configured == 'true'
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > "$HOME/.kube/config"

      - name: Apply production manifests
        if: steps.precheck.outputs.configured == 'true'
        run: kubectl apply -k k8s/overlays/production

      - name: Update production image
        if: steps.precheck.outputs.configured == 'true'
        run: kubectl set image deployment/recommendation-service recommendation-service=${{ needs.docker-build-and-push.outputs.image }} -n recommendation-production

      - name: Wait for production rollout
        if: steps.precheck.outputs.configured == 'true'
        run: kubectl rollout status deployment/recommendation-service -n recommendation-production --timeout=180s

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name != 'pull_request'
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        shell: bash
        run: |
          set -euo pipefail
          KUBECTL_VERSION="$(curl -L -s https://dl.k8s.io/release/stable.txt)"
          curl -L -o kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > "$HOME/.kube/config"

      - name: Wait for deployment
        run: kubectl rollout status deployment/recommendation-service -n recommendation-staging --timeout=300s

      - name: Health check
        run: |
          sleep 60
          kubectl wait --for=condition=ready pod -l app=recommendation-service -n recommendation-staging --timeout=300s

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs:
      - test-matrix
      - package-and-verify
      - kubernetes-validate
      - docker-build-and-push
      - deploy-staging
      - deploy-production
      - health-check
    if: always()
    steps:
      - name: Final pipeline status
        shell: bash
        run: |
          echo "=== PIPELINE SUMMARY ==="
          echo "Tests: ${{ needs.test-matrix.result }}"
          echo "Package & Verify: ${{ needs.package-and-verify.result }}"
          echo "Kubernetes Validate: ${{ needs.kubernetes-validate.result }}"
          echo "Docker Build & Push: ${{ needs.docker-build-and-push.result }}"
          echo "Deploy Staging: ${{ needs.deploy-staging.result }}"
          echo "Deploy Production: ${{ needs.deploy-production.result }}"
          echo "Health Check: ${{ needs.health-check.result }}"

          FAILED_JOBS=""
          if [[ "${{ needs.test-matrix.result }}" != "success" ]]; then FAILED_JOBS="$FAILED_JOBS test-matrix"; fi
          if [[ "${{ needs.package-and-verify.result }}" != "success" ]]; then FAILED_JOBS="$FAILED_JOBS package-and-verify"; fi
          if [[ "${{ needs.kubernetes-validate.result }}" != "success" ]]; then FAILED_JOBS="$FAILED_JOBS kubernetes-validate"; fi
          if [[ "${{ needs.docker-build-and-push.result }}" != "success" ]]; then FAILED_JOBS="$FAILED_JOBS docker-build-and-push"; fi
          if [[ "${{ needs.deploy-staging.result }}" != "success" ]]; then FAILED_JOBS="$FAILED_JOBS deploy-staging"; fi
          if [[ "${{ needs.deploy-production.result }}" != "success" ]]; then FAILED_JOBS="$FAILED_JOBS deploy-production"; fi
          if [[ "${{ needs.health-check.result }}" != "success" ]]; then FAILED_JOBS="$FAILED_JOBS health-check"; fi

          if [[ -n "$FAILED_JOBS" ]]; then
            echo "❌ PIPELINE FAILED"
            echo "Failed jobs:$FAILED_JOBS"
            exit 1
          else
            echo "✅ PIPELINE COMPLETED SUCCESSFULLY"
          fi
