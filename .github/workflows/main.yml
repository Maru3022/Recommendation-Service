name: main.yml

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run unit and context tests
        run: mvn -B -ntp clean test

      - name: Package artifact
        run: mvn -B -ntp package -DskipTests

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: recommendation-service-jar
          path: target/*.jar
          if-no-files-found: error

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Verify compilation from clean state
        run: mvn -B -ntp -DskipTests clean verify

  docker-build-and-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image owner to lowercase
        id: image_owner
        run: |
          OWNER_LOWER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "value=$OWNER_LOWER" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (PR validation)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: recommendation-service:pr-${{ github.sha }}

      - name: Build and push image (main)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.image_owner.outputs.value }}/recommendation-service:latest
            ghcr.io/${{ steps.image_owner.outputs.value }}/recommendation-service:${{ github.sha }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    if: github.event_name != 'pull_request'
    timeout-minutes: 10
    environment:
      name: staging
    steps:
      - name: Deploy placeholder
        run: echo "Staging deployment step is ready. Add real deployment command or action."

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    timeout-minutes: 10
    environment:
      name: production
    steps:
      - name: Deploy placeholder
        run: echo "Production deployment step is ready. Add real deployment command or action."

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality, docker-build-and-push, deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Final pipeline status
        run: |
          echo "Build & Test: ${{ needs.build-and-test.result }}"
          echo "Code Quality: ${{ needs.code-quality.result }}"
          echo "Docker Build & Push: ${{ needs.docker-build-and-push.result }}"
          echo "Deploy Staging: ${{ needs.deploy-staging.result }}"
          echo "Deploy Production: ${{ needs.deploy-production.result }}"
          if [[ "${{ needs.build-and-test.result }}" != "success" || "${{ needs.code-quality.result }}" != "success" || "${{ needs.docker-build-and-push.result }}" != "success" ]]; then
            echo "Pipeline failed."
            exit 1
          fi
          echo "Pipeline completed successfully."