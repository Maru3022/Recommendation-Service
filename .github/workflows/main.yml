name: CI-CD-Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Application Jar
        run: mvn clean package -DskipTests

      - name: Run Infrastructure and Tests
        run: |
          docker compose up -d --build

          echo "Waiting for Recommendation-Service on port 8099..."
          timeout 120s bash -c 'until curl -s localhost:8099/actuator/health > /dev/null; do sleep 5; done' || (echo "App failed to start" && docker compose logs && exit 1)

          echo "Validating Prometheus endpoint..."
          timeout 60s bash -c 'until curl -s localhost:8099/actuator/prometheus | grep -q "jvm_threads_live_threads"; do sleep 5; done' || (echo "Prometheus metrics are not available" && docker compose logs recommendation-service && exit 1)

          echo "Waiting for Prometheus API..."
          timeout 90s bash -c 'until curl -s localhost:9090/-/ready > /dev/null; do sleep 5; done' || (echo "Prometheus failed to start" && docker compose logs prometheus && exit 1)

          echo "Checking Grafana login page..."
          timeout 90s bash -c 'until curl -s -o /dev/null -w "%{http_code}" localhost:3000/login | grep -q "200"; do sleep 5; done' || (echo "Grafana failed to start" && docker compose logs grafana && exit 1)

          echo "Running k6 load tests..."
          docker compose --profile loadtest run --rm k6

      - name: Check App Logs for Errors
        if: always()
        run: |
          echo "=== Checking logs for Critical Exceptions ==="
          docker compose logs recommendation-service | grep -iE "Exception|Error" || echo "No critical errors found."

      - name: Shutdown Infrastructure
        if: always()
        run: docker compose down -v --remove-orphans