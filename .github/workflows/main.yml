name: ci-cd

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  IMAGE_NAME: recommendation-service
  MAVEN_OPTS: "-Xmx1024m"

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run OWASP dependency check
        run: mvn org.owasp:dependency-check:check -DskipTests

      - name: Upload dependency check results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run SonarCloud scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=recommendation-service \
            -Dsonar.organization=maru3022

  test-matrix:
    name: Tests (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        java: ["21"]
        test-type: ['unit', 'integration']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run unit tests
        if: matrix.test-type == 'unit'
        run: mvn -B -ntp clean test jacoco:report

      - name: Run integration tests
        if: matrix.test-type == 'integration'
        run: mvn -B -ntp clean verify jacoco:report -Pintegration-tests

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.test-type }}
          path: |
            target/surefire-reports/
            target/failsafe-reports/

      - name: Upload coverage to Codecov
        if: matrix.test-type == 'unit'
        uses: codecov/codecov-action@v4
        with:
          file: target/site/jacoco/jacoco.xml

  performance-test:
    name: Performance Test
    runs-on: ubuntu-latest
    needs: package-and-verify
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Download application JAR
        uses: actions/download-artifact@v4
        with:
          name: recommendation-service-artifacts

      - name: Start application
        run: |
          java -jar target/*.jar &
          sleep 30

      - name: Install k6
        run: |
          sudo gpg -k /usr/share/keyrings/k6-archive-keyring.gpg --import gpg-key
          sudo gdebi -n k6_0.47.0_amd64.deb

      - name: Run performance tests
        run: k6 run --out json=results.json performance-test.js

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: results.json

  package-and-verify:
    name: Package & Verify
    runs-on: ubuntu-latest
    needs: [test-matrix, security-scan, dependency-check, code-quality]
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Verify compilation from a clean state
        run: mvn -B -ntp -DskipTests clean verify

      - name: Generate SBOM
        run: mvn cyclonedx:makeAggregateBom

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: recommendation-service-artifacts
          path: |
            target/*.jar
            target/*.jar.original
            target/bom.json
          if-no-files-found: error

  kubernetes-validate:
    name: Kubernetes Validate
    runs-on: ubuntu-latest
    needs: package-and-verify
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        shell: bash
        run: |
          set -euo pipefail
          KUBECTL_VERSION="$(curl -L -s https://dl.k8s.io/release/stable.txt)"
          curl -L -o kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Install kubeconform
        shell: bash
        run: |
          set -euo pipefail
          curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          chmod +x kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Render staging manifests
        shell: bash
        run: |
          mkdir -p rendered
          kubectl kustomize k8s/overlays/staging > rendered/staging.yaml

      - name: Validate staging manifests
        run: kubeconform -strict -summary rendered/staging.yaml

      - name: Render production manifests
        shell: bash
        run: kubectl kustomize k8s/overlays/production > rendered/production.yaml

      - name: Validate production manifests
        run: kubeconform -strict -summary rendered/production.yaml

      - name: Upload rendered manifests
        uses: actions/upload-artifact@v4
        with:
          name: recommendation-service-k8s-rendered
          path: rendered/*.yaml
          if-no-files-found: error

  docker-build-and-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [package-and-verify, kubernetes-validate, performance-test]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      image: ${{ steps.image.outputs.value }}
      owner: ${{ steps.owner.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: recommendation-service-artifacts
          path: target/

      - name: Normalize image owner to lowercase
        id: owner
        shell: bash
        run: |
          OWNER_LOWER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "value=$OWNER_LOWER" >> "$GITHUB_OUTPUT"

      - name: Define image reference
        id: image
        shell: bash
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "value=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM and scan
        if: github.event_name != 'pull_request'
        run: |
          docker buildx build \
            --load \
            --sbom=true \
            --provenance=false \
            -t temp-image .

      - name: Build image for pull requests
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: recommendation-service:pr-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true

      - name: Build and push image for main
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.value }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          annotations: |
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    if: github.event_name != 'pull_request'
    timeout-minutes: 15
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check staging kubeconfig availability
        id: precheck
        shell: bash
        env:
          KUBE_CONFIG_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          if [[ -n "$KUBE_CONFIG_STAGING" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip staging deploy when kubeconfig is missing
        if: steps.precheck.outputs.configured != 'true'
        run: echo "KUBE_CONFIG_STAGING is not set. Skipping staging deployment."

      - name: Install kubectl
        if: steps.precheck.outputs.configured == 'true'
        shell: bash
        run: |
          set -euo pipefail
          KUBECTL_VERSION="$(curl -L -s https://dl.k8s.io/release/stable.txt)"
          curl -L -o kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Configure kubeconfig
        if: steps.precheck.outputs.configured == 'true'
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > "$HOME/.kube/config"

      - name: Apply staging manifests
        if: steps.precheck.outputs.configured == 'true'
        run: kubectl apply -k k8s/overlays/staging

      - name: Update staging image
        if: steps.precheck.outputs.configured == 'true'
        run: kubectl set image deployment/recommendation-service recommendation-service=${{ needs.docker-build-and-push.outputs.image }} -n recommendation-staging

      - name: Wait for staging rollout
        if: steps.precheck.outputs.configured == 'true'
        run: kubectl rollout status deployment/recommendation-service -n recommendation-staging --timeout=180s

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build-and-push, deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    timeout-minutes: 15
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check production kubeconfig availability
        id: precheck
        shell: bash
        env:
          KUBE_CONFIG_PRODUCTION: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
        run: |
          if [[ -n "$KUBE_CONFIG_PRODUCTION" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip production deploy when kubeconfig is missing
        if: steps.precheck.outputs.configured != 'true'
        run: echo "KUBE_CONFIG_PRODUCTION is not set. Skipping production deployment."

      - name: Install kubectl
        if: steps.precheck.outputs.configured == 'true'
        shell: bash
        run: |
          set -euo pipefail
          KUBECTL_VERSION="$(curl -L -s https://dl.k8s.io/release/stable.txt)"
          curl -L -o kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Configure kubeconfig
        if: steps.precheck.outputs.configured == 'true'
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > "$HOME/.kube/config"

      - name: Apply production manifests
        if: steps.precheck.outputs.configured == 'true'
        run: kubectl apply -k k8s/overlays/production

      - name: Update production image
        if: steps.precheck.outputs.configured == 'true'
        run: kubectl set image deployment/recommendation-service recommendation-service=${{ needs.docker-build-and-push.outputs.image }} -n recommendation-production

      - name: Wait for production rollout
        if: steps.precheck.outputs.configured == 'true'
        run: kubectl rollout status deployment/recommendation-service -n recommendation-production --timeout=180s

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name != 'pull_request'
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        shell: bash
        run: |
          set -euo pipefail
          KUBECTL_VERSION="$(curl -L -s https://dl.k8s.io/release/stable.txt)"
          curl -L -o kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > "$HOME/.kube/config"

      - name: Wait for deployment
        run: kubectl rollout status deployment/recommendation-service -n recommendation-staging --timeout=300s

      - name: Health check
        run: |
          sleep 60
          kubectl wait --for=condition=ready pod -l app=recommendation-service -n recommendation-staging --timeout=300s

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs:
      - security-scan
      - dependency-check
      - code-quality
      - test-matrix
      - package-and-verify
      - kubernetes-validate
      - performance-test
      - docker-build-and-push
      - deploy-staging
      - deploy-production
      - health-check
    if: always()
    steps:
      - name: Final pipeline status
        shell: bash
        run: |
          echo "=== PIPELINE SUMMARY ==="
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo "Dependency Check: ${{ needs.dependency-check.result }}"
          echo "Code Quality: ${{ needs.code-quality.result }}"
          echo "Tests: ${{ needs.test-matrix.result }}"
          echo "Package & Verify: ${{ needs.package-and-verify.result }}"
          echo "Kubernetes Validate: ${{ needs.kubernetes-validate.result }}"
          echo "Performance Test: ${{ needs.performance-test.result }}"
          echo "Docker Build & Push: ${{ needs.docker-build-and-push.result }}"
          echo "Deploy Staging: ${{ needs.deploy-staging.result }}"
          echo "Deploy Production: ${{ needs.deploy-production.result }}"
          echo "Health Check: ${{ needs.health-check.result }}"

          FAILED_JOBS=""
          if [[ "${{ needs.security-scan.result }}" != "success" ]]; then FAILED_JOBS="$FAILED_JOBS security-scan"; fi
          if [[ "${{ needs.dependency-check.result }}" != "success" ]]; then FAILED_JOBS="$FAILED_JOBS dependency-check"; fi
          if [[ "${{ needs.code-quality.result }}" != "success" ]]; then FAILED_JOBS="$FAILED_JOBS code-quality"; fi
          if [[ "${{ needs.test-matrix.result }}" != "success" ]]; then FAILED_JOBS="$FAILED_JOBS test-matrix"; fi
          if [[ "${{ needs.package-and-verify.result }}" != "success" ]]; then FAILED_JOBS="$FAILED_JOBS package-and-verify"; fi
          if [[ "${{ needs.kubernetes-validate.result }}" != "success" ]]; then FAILED_JOBS="$FAILED_JOBS kubernetes-validate"; fi
          if [[ "${{ needs.performance-test.result }}" != "success" ]]; then FAILED_JOBS="$FAILED_JOBS performance-test"; fi
          if [[ "${{ needs.docker-build-and-push.result }}" != "success" ]]; then FAILED_JOBS="$FAILED_JOBS docker-build-and-push"; fi
          if [[ "${{ needs.deploy-staging.result }}" != "success" ]]; then FAILED_JOBS="$FAILED_JOBS deploy-staging"; fi
          if [[ "${{ needs.deploy-production.result }}" != "success" ]]; then FAILED_JOBS="$FAILED_JOBS deploy-production"; fi
          if [[ "${{ needs.health-check.result }}" != "success" ]]; then FAILED_JOBS="$FAILED_JOBS health-check"; fi

          if [[ -n "$FAILED_JOBS" ]]; then
            echo "❌ PIPELINE FAILED"
            echo "Failed jobs: $FAILED_JOBS"
            exit 1
          else
            echo "✅ PIPELINE COMPLETED SUCCESSFULLY"
          fi
